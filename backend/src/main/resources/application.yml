spring:
  application:
    name: vectortech-backend

  # Database Configuration (uses environment variables for Docker)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:vectortech;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS public}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: ${SPRING_JPA_OPEN_IN_VIEW:false}
    properties:
      hibernate:
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
        format_sql: true

  sql:
    init:
      mode: always
      platform: ${SPRING_SQL_INIT_PLATFORM:h2}
      data-locations: classpath:data.sql

  h2:
    console:
      enabled: false
      path: /h2-console

  # Redis Configuration (Spring Data Redis uses spring.data.redis.*)
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 60000ms

server:
  port: 8080

# Actuator for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${APP_JWT_SECRET:cGxlYXNlLWNoYW5nZS10aGlzLXNlY3JldC1pbi1wcm9kdWN0aW9u}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://vectortech.vercel.app}
  
  # Rate Limiting Configuration
  rate-limiting:
    enabled: ${RATE_LIMITING_ENABLED:true}
    login:
      max-attempts: ${RATE_LIMIT_LOGIN_ATTEMPTS:5}
      window-minutes: ${RATE_LIMIT_LOGIN_WINDOW_MINUTES:1}
    register:
      max-attempts: ${RATE_LIMIT_REGISTER_ATTEMPTS:3}
      window-hours: ${RATE_LIMIT_REGISTER_WINDOW_HOURS:1}
    api:
      max-requests: ${RATE_LIMIT_API_REQUESTS:100}
      window-minutes: ${RATE_LIMIT_API_WINDOW_MINUTES:1}
  
  # Security Configuration
  security:
    # Password Configuration
    password:
      min-length: 8
      require-uppercase: true
      require-lowercase: true
      require-numbers: true
      require-special-chars: true
    
    # Session Configuration
    session:
      timeout-minutes: ${SESSION_TIMEOUT_MINUTES:30}
      cookie-secure: ${SESSION_COOKIE_SECURE:true}
      cookie-http-only: true
      cookie-same-site: Strict
    
    # JWT Configuration
    jwt:
      access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
      refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}
      
    # HTTPS Configuration
    require-https: ${REQUIRE_HTTPS:false}

logging:
  level:
    com.vectortech: ${LOGGING_LEVEL_COM_VECTORTECH:INFO}
    org.springframework: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK:WARN}
    org.hibernate: ${LOGGING_LEVEL_ORG_HIBERNATE:WARN}
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
