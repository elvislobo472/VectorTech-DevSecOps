apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: devsecops
    tier: frontend
spec:
  type: ClusterIP
  selector:
    app: devsecops
    tier: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: devsecops
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: devsecops
    tier: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: devsecops
    tier: database
spec:
  type: ClusterIP
  selector:
    app: devsecops
    tier: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    app: devsecops
    tier: cache
spec:
  type: ClusterIP
  selector:
    app: devsecops
    tier: cache
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    app: devsecops
    tier: proxy
spec:
  type: NodePort
  selector:
    app: devsecops
    tier: proxy
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
